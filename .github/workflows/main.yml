name: health-monitor CI

on:
    push:

jobs:
    test:
        runs-on: ubuntu-latest
        services:
            postgres:
                image: "postgres:17"
                ports: 
                    - "5432:5432"
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: 13030555a
                    POSTGRES_DB: health-monitor-test-db
                options:
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5 
              with: 
                python-version: "3.13"
                cache: "pip"
            
            - name: Install Dependencies
              run: pip install -r requirements.txt

            - name: Unit Tests
              run: python -m pytest tests/unit -v
            
            - name: Integration Tests
              run: python -m pytest tests/integration -v
              env:
                TEST_DATABASE_URL: "postgresql+asyncpg://postgres:13030555a@localhost:5432/health-monitor-test-db"

            - name: E2E Tests
              run: python -m pytest tests/e2e -v
              env:
                TEST_DATABASE_URL: "postgresql+asyncpg://postgres:13030555a@localhost:5432/health-monitor-test-db"

        

    