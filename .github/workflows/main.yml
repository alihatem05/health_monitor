name: health-monitor CI

on:
    push:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        env:
            DATABASE_URL: "${{ secrets.TEST_DATABASE_URL }}"
            TEST_DATABASE_URL: "${{ secrets.TEST_DATABASE_URL }}"
            FLUSH_INTERVAL: "5"
        services:
            postgres:
                image: "postgres:17"
                ports: 
                    - "5432:5432"
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: 13030555a
                    POSTGRES_DB: health-monitor-test-db
                options:
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5 
              with: 
                python-version: "3.13"
                cache: "pip"
            
            - name: Install Dependencies
              run: pip install -r requirements.txt

            - name: Unit Tests
              run: python -m pytest tests/unit -v
            
            - name: Integration Tests
              run: python -m pytest tests/integration -v

            - name: E2E Tests
              run: python -m pytest tests/e2e -v
              
    build:
        env:
            IMAGE_NAME: health-monitor
        needs: test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build Image
              run: |
                  docker build \
                    -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                    -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest \
                    .
              
            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_TOKEN }}

            - name: Push Image to Registry
              run: docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} && \
                   docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest